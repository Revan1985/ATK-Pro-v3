name: Build macOS App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permette esecuzione manuale

permissions:
  contents: write

jobs:
  build-macos:
    # macos-13 = Intel x86_64 runner.
    # Produces an x86_64 binary that runs natively on Intel Macs
    # and via Rosetta 2 (transparent, seamless) on Apple Silicon.
    # Switch to universal2 in a future release when Rosetta-free support
    # for both architectures is needed.
    runs-on: macos-13
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<70.0" wheel
        python -c "import pkg_resources; print('✓ pkg_resources disponibile')"
        pip install --no-cache-dir pyinstaller -r requirements.txt
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        
    - name: Verify project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        echo "=== Assets ==="
        ls -la assets/ | head -20
        echo "=== Locales ==="
        ls -la locales/ | head -10
        echo "=== Docs generali ==="
        ls -la docs_generali/
        
    - name: Build macOS app with PyInstaller
      env:
        MACOSX_DEPLOYMENT_TARGET: "12.0"   # macOS Monterey minimum
      run: |
        pyinstaller \
          --name ATK-Pro \
          --windowed \
          --onefile \
          --target-arch x86_64 \
          --icon=assets/common/grafici/ATK-Pro.ico \
          --osx-bundle-identifier=com.atkpro.atkpro \
          --add-data "src/main_gui_qt.py:src" \
          --add-data "src/user_prompts.py:src" \
          --add-data "assets:assets" \
          --add-data "locales:locales" \
          --add-data "docs_generali/glossario_multilingua_ATK-Pro.json:docs_generali" \
          --hidden-import=playwright \
          --hidden-import=PIL \
          --hidden-import=PySide6 \
          --hidden-import=PySide6.QtCore \
          --hidden-import=PySide6.QtGui \
          --hidden-import=PySide6.QtWidgets \
          --hidden-import=requests \
          --hidden-import=urllib3 \
          --hidden-import=certifi \
          --hidden-import=src.main_gui_qt \
          --exclude-module=pytest \
          --exclude-module=matplotlib \
          --exclude-module=scipy \
          --exclude-module=numpy \
          --exclude-module=pandas \
          src/main.py
        
        # Copia Info.plist personalizzato nell'app bundle
        if [ -f "Info.plist" ]; then
          cp -f Info.plist dist/ATK-Pro.app/Contents/Info.plist
          echo "✓ Info.plist personalizzato copiato"
        fi
          
    - name: Verify build output
      run: |
        echo "=== Build output ==="
        ls -lah dist/
        if [ -f "dist/ATK-Pro.app/Contents/MacOS/ATK-Pro" ]; then
          echo "✓ ATK-Pro.app compiled successfully"
          du -sh dist/ATK-Pro.app
        else
          echo "✗ Build failed - no .app found"
          exit 1
        fi
        
    - name: Ad-hoc code signing
      run: |
        # Firma ad-hoc: non richiede Apple Developer certificate.
        # Permette a macOS di valutare l'app con Gatekeeper invece di bloccarla
        # silenziosamente. Con questa firma, "Apri comunque" appare in
        # Impostazioni di Sistema > Privacy e Sicurezza anche su macOS 15+,
        # e il metodo xattr funziona in modo affidabile.
        echo "=== Ad-hoc code signing ==="
        codesign --deep --force --sign - dist/ATK-Pro.app
        codesign --verify --verbose dist/ATK-Pro.app \
          && echo "✓ Firma ad-hoc valida" \
          || { echo "✗ Verifica firma fallita"; exit 1; }
        
        # Verifica architettura: deve essere x86_64
        ARCH=$(lipo -archs dist/ATK-Pro.app/Contents/MacOS/ATK-Pro)
        echo "Architettura binario: $ARCH"
        [[ "$ARCH" == "x86_64" ]] && echo "✓ x86_64 confermato" || echo "⚠ Architettura inattesa: $ARCH"

    - name: Create DMG installer
      run: |
        # Crea directory per DMG
        mkdir -p dist/dmg
        cp -r dist/ATK-Pro.app dist/dmg/
        
        # Copia README con istruzioni macOS
        if [ -f "README_MACOS.txt" ]; then
          cp README_MACOS.txt dist/dmg/
          echo "✓ README_MACOS.txt incluso nel DMG"
        fi
        
        # Crea link simbolico ad Applications per drag & drop
        ln -s /Applications dist/dmg/Applications
        
        # Installa create-dmg per SLA obbligatoria (legal disclaimer)
        brew install create-dmg

        # Leggi versione dall'app (grep + sed, no Python multiline issues)
        APP_VERSION=$(grep -m1 'VERSION\s*=' src/main_gui_qt.py | sed "s/.*VERSION\s*=\s*['\"]//;s/['\"].*//")
        [ -z "$APP_VERSION" ] && APP_VERSION="2.2.0"
        echo "Versione app: $APP_VERSION"

        # Usa il file disclaimer già presente nel repo
        cp assets/en/testuali/disclaimer_legale_ATK-Pro.txt /tmp/atk-disclaimer.txt

        # Crea DMG con SLA integrata (il disclaimer appare al primo montaggio,
        # l'utente DEVE cliccare "Accetto" per procedere all'installazione)
        create-dmg \
          --volname "ATK-Pro v${APP_VERSION}" \
          --eula /tmp/atk-disclaimer.txt \
          --no-internet-enable \
          dist/ATK-Pro-macOS.dmg \
          dist/dmg/

        echo "✓ DMG with mandatory SLA created: $(du -sh dist/ATK-Pro-macOS.dmg)"
        
    - name: Upload .app artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-macOS-app
        path: dist/ATK-Pro.app
        retention-days: 30
        
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-macOS-dmg
        path: dist/ATK-Pro-macOS.dmg
        retention-days: 30
        
    - name: Upload to GitHub Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        # Assicura che la release esista e non sia draft
        # (gh release upload fallisce con 404 su release draft)
        REPO="$GITHUB_REPOSITORY"
        REL_ID=$(gh api "repos/$REPO/releases" \
          --jq "[.[] | select(.tag_name==\"${{ github.ref_name }}\")][0].id // empty" 2>/dev/null || true)
        if [ -n "$REL_ID" ]; then
          gh api "repos/$REPO/releases/$REL_ID" --method PATCH \
            --field draft=false --field prerelease=false > /dev/null 2>&1 || true
        else
          gh release create "${{ github.ref_name }}" \
            --title "ATK-Pro ${{ github.ref_name }}" \
            --notes "" --draft=false 2>/dev/null || true
        fi
        gh release upload "${{ github.ref_name }}" \
          dist/ATK-Pro-macOS.dmg \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
