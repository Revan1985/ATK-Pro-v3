name: Build macOS App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Due job paralleli:
#   build-macos-intel        → x86_64 via Rosetta  → Intel Mac (macOS 12+)
#   build-macos-silicon      → arm64 nativo         → Apple Silicon M1/M2/M3
# Producono due DMG separati: ATK-Pro-macOS-Intel-vX.Y.Z.dmg
#                              ATK-Pro-macOS-AppleSilicon-vX.Y.Z.dmg
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Intel x86_64 (via Rosetta 2)
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos-intel:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python 3.12 universal2 da python.org
      run: |
        curl -fsSL -o /tmp/py312.pkg \
          "https://www.python.org/ftp/python/3.12.9/python-3.12.9-macos11.pkg"
        sudo installer -pkg /tmp/py312.pkg -target /
        /usr/local/bin/python3.12 --version
        file /usr/local/bin/python3.12
        echo "Verifica x86_64 via Rosetta:"
        arch -x86_64 /usr/local/bin/python3.12 -c "import platform; print('arch:', platform.machine())"

    - name: Install dependencies (x86_64 via Rosetta)
      run: |
        arch -x86_64 /usr/local/bin/python3.12 -m pip install --upgrade pip
        arch -x86_64 /usr/local/bin/python3.12 -m pip install "setuptools<70.0" wheel
        arch -x86_64 /usr/local/bin/python3.12 -m pip install --no-cache-dir pyinstaller -r requirements.txt

    - name: Install Playwright (x86_64)
      run: arch -x86_64 /usr/local/bin/python3.12 -m playwright install chromium

    - name: Build app x86_64 (Intel / Rosetta)
      env:
        MACOSX_DEPLOYMENT_TARGET: "12.0"
      run: |
        arch -x86_64 /usr/local/bin/python3.12 -m PyInstaller \
          --name ATK-Pro \
          --windowed \
          --onefile \
          --icon=assets/common/grafici/ATK-Pro.ico \
          --osx-bundle-identifier=com.atkpro.atkpro \
          --add-data "src/main_gui_qt.py:src" \
          --add-data "src/user_prompts.py:src" \
          --add-data "assets:assets" \
          --add-data "locales:locales" \
          --add-data "docs_generali/glossario_multilingua_ATK-Pro.json:docs_generali" \
          --hidden-import=playwright \
          --hidden-import=PIL \
          --hidden-import=PySide6 \
          --hidden-import=PySide6.QtCore \
          --hidden-import=PySide6.QtGui \
          --hidden-import=PySide6.QtWidgets \
          --hidden-import=requests \
          --hidden-import=urllib3 \
          --hidden-import=certifi \
          --hidden-import=src.main_gui_qt \
          --exclude-module=pytest \
          --exclude-module=matplotlib \
          --exclude-module=scipy \
          --exclude-module=numpy \
          --exclude-module=pandas \
          src/main.py
        [ -f "Info.plist" ] && cp -f Info.plist dist/ATK-Pro.app/Contents/Info.plist
        ARCH=$(lipo -archs dist/ATK-Pro.app/Contents/MacOS/ATK-Pro)
        echo "Architettura: $ARCH"
        [[ "$ARCH" == "x86_64" ]] && echo "✓ x86_64 confermato" || { echo "✗ Architettura inattesa: $ARCH"; exit 1; }

    - name: Ad-hoc sign + verifica (Intel)
      run: |
        codesign --deep --force --sign - dist/ATK-Pro.app
        codesign --verify --verbose dist/ATK-Pro.app \
          && echo "✓ Firma ad-hoc valida" \
          || { echo "✗ Verifica firma fallita"; exit 1; }

    - name: Leggi versione
      id: ver
      run: |
        VER=$(grep -m1 'VERSION\s*=' src/main_gui_qt.py | sed "s/.*VERSION\s*=\s*['\"]//;s/['\"].*//")
        [ -z "$VER" ] && VER="3.0.0"
        echo "version=$VER" >> $GITHUB_OUTPUT
        echo "Versione: $VER"

    - name: Crea DMG Intel
      run: |
        mkdir -p dist/dmg_intel
        cp -r dist/ATK-Pro.app dist/dmg_intel/
        [ -f "README_MACOS.txt" ] && cp README_MACOS.txt dist/dmg_intel/
        ln -s /Applications dist/dmg_intel/Applications
        cp assets/en/testuali/disclaimer_legale_ATK-Pro.txt /tmp/atk-disclaimer.txt
        brew install create-dmg
        DMG_NAME="ATK-Pro-macOS-Intel-v${{ steps.ver.outputs.version }}.dmg"
        create-dmg \
          --volname "ATK-Pro v${{ steps.ver.outputs.version }} — Intel" \
          --eula /tmp/atk-disclaimer.txt \
          --no-internet-enable \
          dist/${DMG_NAME} \
          dist/dmg_intel/
        echo "✓ $(du -sh dist/${DMG_NAME})"

    - name: Upload artifact (Intel app)
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-macOS-Intel-app
        path: dist/ATK-Pro.app
        retention-days: 30

    - name: Upload artifact (Intel DMG)
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-macOS-Intel-dmg
        path: dist/ATK-Pro-macOS-Intel-v*.dmg
        retention-days: 30

    - name: Upload to GitHub Release (Intel)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        REPO="$GITHUB_REPOSITORY"
        REL_ID=$(gh api "repos/$REPO/releases" \
          --jq "[.[] | select(.tag_name==\"${{ github.ref_name }}\")][0].id // empty" 2>/dev/null || true)
        if [ -n "$REL_ID" ]; then
          gh api "repos/$REPO/releases/$REL_ID" --method PATCH \
            --field draft=false --field prerelease=false > /dev/null 2>&1 || true
        else
          gh release create "${{ github.ref_name }}" \
            --title "ATK-Pro ${{ github.ref_name }}" \
            --notes "" --draft=false 2>/dev/null || true
        fi
        gh release upload "${{ github.ref_name }}" \
          dist/ATK-Pro-macOS-Intel-v${{ steps.ver.outputs.version }}.dmg \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Apple Silicon arm64 (nativo, M1/M2/M3/M4)
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos-silicon:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Python 3.12 universal2 da python.org
      run: |
        curl -fsSL -o /tmp/py312.pkg \
          "https://www.python.org/ftp/python/3.12.9/python-3.12.9-macos11.pkg"
        sudo installer -pkg /tmp/py312.pkg -target /
        /usr/local/bin/python3.12 --version
        file /usr/local/bin/python3.12
        echo "Verifica arm64 nativo:"
        /usr/local/bin/python3.12 -c "import platform; print('arch:', platform.machine())"

    - name: Install dependencies (arm64 nativo)
      run: |
        /usr/local/bin/python3.12 -m pip install --upgrade pip
        /usr/local/bin/python3.12 -m pip install "setuptools<70.0" wheel
        /usr/local/bin/python3.12 -m pip install --no-cache-dir pyinstaller -r requirements.txt

    - name: Install Playwright (arm64)
      run: /usr/local/bin/python3.12 -m playwright install chromium

    - name: Build app arm64 (Apple Silicon nativo)
      env:
        MACOSX_DEPLOYMENT_TARGET: "12.0"
      run: |
        /usr/local/bin/python3.12 -m PyInstaller \
          --name ATK-Pro \
          --windowed \
          --onefile \
          --target-arch arm64 \
          --icon=assets/common/grafici/ATK-Pro.ico \
          --osx-bundle-identifier=com.atkpro.atkpro \
          --add-data "src/main_gui_qt.py:src" \
          --add-data "src/user_prompts.py:src" \
          --add-data "assets:assets" \
          --add-data "locales:locales" \
          --add-data "docs_generali/glossario_multilingua_ATK-Pro.json:docs_generali" \
          --hidden-import=playwright \
          --hidden-import=PIL \
          --hidden-import=PySide6 \
          --hidden-import=PySide6.QtCore \
          --hidden-import=PySide6.QtGui \
          --hidden-import=PySide6.QtWidgets \
          --hidden-import=requests \
          --hidden-import=urllib3 \
          --hidden-import=certifi \
          --hidden-import=src.main_gui_qt \
          --exclude-module=pytest \
          --exclude-module=matplotlib \
          --exclude-module=scipy \
          --exclude-module=numpy \
          --exclude-module=pandas \
          src/main.py
        [ -f "Info.plist" ] && cp -f Info.plist dist/ATK-Pro.app/Contents/Info.plist
        ARCH=$(lipo -archs dist/ATK-Pro.app/Contents/MacOS/ATK-Pro)
        echo "Architettura: $ARCH"
        [[ "$ARCH" == "arm64" ]] && echo "✓ arm64 confermato" || { echo "✗ Architettura inattesa: $ARCH"; exit 1; }

    - name: Ad-hoc sign + verifica (Apple Silicon)
      run: |
        codesign --deep --force --sign - dist/ATK-Pro.app
        codesign --verify --verbose dist/ATK-Pro.app \
          && echo "✓ Firma ad-hoc valida" \
          || { echo "✗ Verifica firma fallita"; exit 1; }

    - name: Leggi versione
      id: ver
      run: |
        VER=$(grep -m1 'VERSION\s*=' src/main_gui_qt.py | sed "s/.*VERSION\s*=\s*['\"]//;s/['\"].*//")
        [ -z "$VER" ] && VER="3.0.0"
        echo "version=$VER" >> $GITHUB_OUTPUT
        echo "Versione: $VER"

    - name: Crea DMG Apple Silicon
      run: |
        mkdir -p dist/dmg_arm64
        cp -r dist/ATK-Pro.app dist/dmg_arm64/
        [ -f "README_MACOS.txt" ] && cp README_MACOS.txt dist/dmg_arm64/
        ln -s /Applications dist/dmg_arm64/Applications
        cp assets/en/testuali/disclaimer_legale_ATK-Pro.txt /tmp/atk-disclaimer.txt
        brew install create-dmg
        DMG_NAME="ATK-Pro-macOS-AppleSilicon-v${{ steps.ver.outputs.version }}.dmg"
        create-dmg \
          --volname "ATK-Pro v${{ steps.ver.outputs.version }} — Apple Silicon" \
          --eula /tmp/atk-disclaimer.txt \
          --no-internet-enable \
          dist/${DMG_NAME} \
          dist/dmg_arm64/
        echo "✓ $(du -sh dist/${DMG_NAME})"

    - name: Upload artifact (Apple Silicon app)
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-macOS-AppleSilicon-app
        path: dist/ATK-Pro.app
        retention-days: 30

    - name: Upload artifact (Apple Silicon DMG)
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-macOS-AppleSilicon-dmg
        path: dist/ATK-Pro-macOS-AppleSilicon-v*.dmg
        retention-days: 30

    - name: Upload to GitHub Release (Apple Silicon)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        REPO="$GITHUB_REPOSITORY"
        REL_ID=$(gh api "repos/$REPO/releases" \
          --jq "[.[] | select(.tag_name==\"${{ github.ref_name }}\")][0].id // empty" 2>/dev/null || true)
        if [ -n "$REL_ID" ]; then
          gh api "repos/$REPO/releases/$REL_ID" --method PATCH \
            --field draft=false --field prerelease=false > /dev/null 2>&1 || true
        else
          gh release create "${{ github.ref_name }}" \
            --title "ATK-Pro ${{ github.ref_name }}" \
            --notes "" --draft=false 2>/dev/null || true
        fi
        gh release upload "${{ github.ref_name }}" \
          dist/ATK-Pro-macOS-AppleSilicon-v${{ steps.ver.outputs.version }}.dmg \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
