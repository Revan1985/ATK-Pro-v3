name: Build Linux App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-xinerama0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xkb1 \
          libxkbcommon-x11-0 \
          libdbus-1-3 \
          libegl1 \
          libfontconfig1 \
          libgl1 \
          libglib2.0-0 \
          libnss3 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          imagemagick \
          xdg-utils
        echo "✓ System dependencies installed"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<70.0" wheel
        python -c "import pkg_resources; print('✓ pkg_resources disponibile')"  
        pip install --no-cache-dir pyinstaller -r requirements.txt

    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Verify project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        echo -e "\n=== Assets ==="
        ls -la assets/ | head -20
        echo -e "\n=== Locales ==="
        ls -la locales/ | head -10
        echo -e "\n=== Docs generali ==="
        ls -la docs_generali/

    - name: Build Linux executable with PyInstaller
      run: |
        pyinstaller \
          --name ATK-Pro \
          --onefile \
          --windowed \
          --icon=assets/common/grafici/ATK-Pro.ico \
          --add-data "src/main_gui_qt.py:src" \
          --add-data "src/user_prompts.py:src" \
          --add-data "src/image_metadata_viewer.py:src" \
          --add-data "assets:assets" \
          --add-data "locales:locales" \
          --add-data "docs_generali/glossario_multilingua_ATK-Pro.json:docs_generali" \
          --hidden-import=playwright \
          --hidden-import=PIL \
          --hidden-import=PySide6 \
          --hidden-import=PySide6.QtCore \
          --hidden-import=PySide6.QtGui \
          --hidden-import=PySide6.QtWidgets \
          --hidden-import=requests \
          --hidden-import=urllib3 \
          --hidden-import=certifi \
          --hidden-import=src.main_gui_qt \
          --hidden-import=asset_cache \
          --hidden-import=api_client \
          --hidden-import=browser_setup \
          --hidden-import=canvas_id_extractor \
          --hidden-import=canvas_processor \
          --hidden-import=cli_dispatcher \
          --hidden-import=config \
          --hidden-import=elaborazione \
          --hidden-import=ensure_playwright \
          --hidden-import=export_manager \
          --hidden-import=image_downloader \
          --hidden-import=image_metadata_viewer \
          --hidden-import=image_rebuilder \
          --hidden-import=image_saver \
          --hidden-import=input_loader \
          --hidden-import=input_parser \
          --hidden-import=link_editor \
          --hidden-import=logging_utils \
          --hidden-import=manifest_parser \
          --hidden-import=manifest_utils \
          --hidden-import=metadata_manager \
          --hidden-import=metadata_utils \
          --hidden-import=ocr_processor \
          --hidden-import=pdf_generator \
          --hidden-import=pdf_utils \
          --hidden-import=qt_worker \
          --hidden-import=tile_downloader \
          --hidden-import=tile_rebuilder \
          --hidden-import=translator \
          --hidden-import=ui_info \
          --hidden-import=url_utils \
          --hidden-import=user_prompts \
          --hidden-import=utils_install \
          --hidden-import=viewer \
          --paths=src \
          --exclude-module=pytest \
          --exclude-module=matplotlib \
          --exclude-module=scipy \
          --exclude-module=numpy \
          --exclude-module=pandas \
          src/main.py

    - name: Verify build output
      run: |
        echo "=== Build output ==="
        ls -lah dist/
        if [ -f "dist/ATK-Pro" ]; then
          echo "✓ ATK-Pro executable compiled successfully"
          SIZE=$(du -h dist/ATK-Pro | cut -f1)
          echo "Executable size: $SIZE"
          file dist/ATK-Pro
          chmod +x dist/ATK-Pro
        else
          echo "✗ Build failed - no executable found"
          exit 1
        fi

    - name: Create tarball
      run: |
        cp README_LINUX.txt dist/
        echo "✓ README_LINUX.txt copied to dist/"
        cd dist
        tar -czf ATK-Pro-Linux.tar.gz ATK-Pro README_LINUX.txt
        echo "✓ Tarball created: $(du -sh ATK-Pro-Linux.tar.gz)"
        sha256sum ATK-Pro-Linux.tar.gz > ATK-Pro-Linux.tar.gz.sha256
        echo "✓ SHA256 checksum:"
        cat ATK-Pro-Linux.tar.gz.sha256

    - name: Create .deb package
      run: |
        VERSION=$(grep 'VERSION = ' src/main_gui_qt.py | sed 's/.*"\(.*\)".*/\1/')
        echo "Building .deb for version: $VERSION"

        PKG_DIR="atk-pro_${VERSION}_amd64"

        # Struttura directory Debian
        mkdir -p "$PKG_DIR/DEBIAN"
        mkdir -p "$PKG_DIR/opt/ATK-Pro"
        mkdir -p "$PKG_DIR/usr/share/applications"
        mkdir -p "$PKG_DIR/usr/share/pixmaps"

        # Copia il binario
        cp dist/ATK-Pro "$PKG_DIR/opt/ATK-Pro/ATK-Pro"
        chmod +x "$PKG_DIR/opt/ATK-Pro/ATK-Pro"
        cp README_LINUX.txt "$PKG_DIR/opt/ATK-Pro/"

        # Converti icona .ico -> .png (prende il frame 256x256)
        convert 'assets/common/grafici/ATK-Pro.ico[0]' \
          -resize 256x256 \
          "$PKG_DIR/usr/share/pixmaps/atk-pro.png"
        echo "✓ Icona convertita"

        # File .desktop (crea voce nel menu applicazioni)
        # Nota: si usa printf invece di heredoc per compatibilità YAML
        printf '%s\n' \
          '[Desktop Entry]' \
          'Version=1.0' \
          'Type=Application' \
          'Name=ATK-Pro' \
          'Comment=Estrazione immagini da Canvas LMS (portale Antenati)' \
          'Exec=/opt/ATK-Pro/ATK-Pro' \
          'Icon=atk-pro' \
          'Terminal=false' \
          'Categories=Utility;Education;' \
          'StartupNotify=true' \
          'StartupWMClass=ATK-Pro' \
          > "$PKG_DIR/usr/share/applications/atk-pro.desktop"
        echo "✓ .desktop creato"

        # File control del pacchetto
        INSTALLED_SIZE=$(du -sk "$PKG_DIR/opt" | cut -f1)
        printf 'Package: atk-pro\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nInstalled-Size: %s\nDepends: libxcb-xinerama0, libxcb-cursor0, libegl1, libdbus-1-3, libxkbcommon-x11-0, xdg-utils\nMaintainer: Daniele Pigoli\nDescription: ATK-Pro - Estrazione immagini da Canvas LMS\n Strumento per estrarre, visualizzare ed esportare immagini e documenti\n dai corsi Canvas LMS (portale Antenati).\n .\n Supporta 20 lingue: IT, EN, ES, DE, FR, PT, NL, AR, HE, RU,\n JA, SV, ZH, RO, EL, PL, DA, NO, TR, VI\n' \
          "$VERSION" "$INSTALLED_SIZE" \
          > "$PKG_DIR/DEBIAN/control"
        echo "✓ control creato"

        # Copia i file DEBIAN dal repo (no inline generation — evita problemi di quoting YAML)
        cp .github/deb-scripts/templates "$PKG_DIR/DEBIAN/templates"
        cp .github/deb-scripts/config    "$PKG_DIR/DEBIAN/config"
        cp .github/deb-scripts/preinst   "$PKG_DIR/DEBIAN/preinst"
        cp .github/deb-scripts/postinst  "$PKG_DIR/DEBIAN/postinst"
        cp .github/deb-scripts/prerm     "$PKG_DIR/DEBIAN/prerm"
        chmod 755 "$PKG_DIR/DEBIAN/config" "$PKG_DIR/DEBIAN/preinst" "$PKG_DIR/DEBIAN/postinst" "$PKG_DIR/DEBIAN/prerm"
        echo "✓ scripts DEBIAN copiati (templates, config, preinst, postinst, prerm)"

        # Verifica che i file siano corretti
        echo "--- templates ---"; cat "$PKG_DIR/DEBIAN/templates"
        echo "--- config ---";    cat "$PKG_DIR/DEBIAN/config"
        echo "--- preinst ---";   cat "$PKG_DIR/DEBIAN/preinst"

        # Costruisci il .deb
        dpkg-deb --build --root-owner-group "$PKG_DIR" dist/ATK-Pro-Linux.deb
        echo "✓ .deb creato: $(du -sh dist/ATK-Pro-Linux.deb)"
        dpkg-deb --info dist/ATK-Pro-Linux.deb

        # Checksum
        cd dist
        sha256sum ATK-Pro-Linux.deb > ATK-Pro-Linux.deb.sha256
        echo "✓ SHA256 .deb:"
        cat ATK-Pro-Linux.deb.sha256

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Linux-executable
        path: dist/ATK-Pro
        retention-days: 30

    - name: Upload tarball artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Linux-tarball
        path: |
          dist/ATK-Pro-Linux.tar.gz
          dist/ATK-Pro-Linux.tar.gz.sha256
        retention-days: 30

    - name: Upload deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Linux-deb
        path: |
          dist/ATK-Pro-Linux.deb
          dist/ATK-Pro-Linux.deb.sha256
        retention-days: 30

    - name: Upload to GitHub Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        # Assicura che la release esista e non sia draft
        # (gh release upload fallisce con 404 su release draft)
        REPO="$GITHUB_REPOSITORY"
        REL_ID=$(gh api "repos/$REPO/releases" \
          --jq "[.[] | select(.tag_name==\"${{ github.ref_name }}\")][0].id // empty" 2>/dev/null || true)
        if [ -n "$REL_ID" ]; then
          gh api "repos/$REPO/releases/$REL_ID" --method PATCH \
            --field draft=false --field prerelease=false > /dev/null 2>&1 || true
        else
          gh release create "${{ github.ref_name }}" \
            --title "ATK-Pro ${{ github.ref_name }}" \
            --notes "" --draft=false 2>/dev/null || true
        fi
        gh release upload "${{ github.ref_name }}" \
          dist/ATK-Pro-Linux.tar.gz \
          dist/ATK-Pro-Linux.tar.gz.sha256 \
          dist/ATK-Pro-Linux.deb \
          dist/ATK-Pro-Linux.deb.sha256 \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-linux:
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
    - name: Download executable artifact
      uses: actions/download-artifact@v4
      with:
        name: ATK-Pro-Linux-executable
        path: dist/

    - name: Install Qt runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
          libxcb-xkb1 libxkbcommon-x11-0 libdbus-1-3 libegl1 \
          libfontconfig1 libgl1 libglib2.0-0 libnss3 \
          libxcomposite1 libxdamage1 libxrandr2 libxcb-cursor0 \
          xvfb

    - name: Install runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          libxcb-xinerama0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xkb1 \
          libxcb-cursor0 \
          libxcb-util1 \
          libxkbcommon-x11-0 \
          libdbus-1-3 \
          libegl1 \
          libfontconfig1 \
          libgl1 \
          libglib2.0-0 \
          libnss3 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libx11-xcb1 \
          libxext6
        echo "✓ Runtime dependencies installed"

    - name: Verifica eseguibile e librerie
      run: |
        chmod +x dist/ATK-Pro
        ls -lah dist/ATK-Pro
        file dist/ATK-Pro
        echo ""
        echo "=== Librerie NON trovate ==="
        ldd dist/ATK-Pro 2>&1 | grep "not found" || echo "✓ Tutte le librerie di sistema trovate"

    - name: Smoke test - avvio binario (offscreen)
      env:
        QT_QPA_PLATFORM: offscreen
        QTWEBENGINE_DISABLE_SANDBOX: "1"
        QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox"
      run: |
        chmod +x dist/ATK-Pro
        set +e
        timeout 20 dist/ATK-Pro 2>&1
        EXIT_CODE=$?
        set -e
        echo "Exit code: $EXIT_CODE"
        if [ "$EXIT_CODE" -eq 0 ] || [ "$EXIT_CODE" -eq 1 ] || [ "$EXIT_CODE" -eq 124 ]; then
          echo "✓ PASS: Binario avviato correttamente (exit $EXIT_CODE)"
        else
          echo "✗ FAIL: Crash del binario con exit code $EXIT_CODE"
          exit 1
        fi

    - name: Smoke test - display virtuale Xvfb
      env:
        QTWEBENGINE_DISABLE_SANDBOX: "1"
        QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox"
      run: |
        set +e
        timeout 20 xvfb-run \
          --auto-servernum \
          --server-args="-screen 0 1280x720x24" \
          dist/ATK-Pro 2>&1
        EXIT_CODE=$?
        set -e
        echo "Xvfb exit code: $EXIT_CODE"
        if [ "$EXIT_CODE" -eq 0 ] || [ "$EXIT_CODE" -eq 1 ] || [ "$EXIT_CODE" -eq 124 ]; then
          echo "✓ PASS: Binario avviato con display virtuale (exit $EXIT_CODE)"
        else
          echo "⚠ WARN: Exit code $EXIT_CODE con Xvfb"
        fi

    - name: Verifica librerie dinamiche linkate
      run: |
        echo "=== Librerie NON trovate (HARD check) ==="
        MISSING=$(ldd dist/ATK-Pro 2>&1 | grep "not found" || true)
        if [ -n "$MISSING" ]; then
          echo "✗ FAIL: Librerie mancanti:"
          echo "$MISSING"
          exit 1
        fi
        echo "✓ PASS: Tutte le librerie trovate"
        echo ""
        echo "=== Tutte le librerie ==="
        ldd dist/ATK-Pro 2>&1 | head -50 || true
