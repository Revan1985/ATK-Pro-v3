name: Build Linux App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permette esecuzione manuale

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-xinerama0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xkb1 \
          libxkbcommon-x11-0 \
          libdbus-1-3 \
          libegl1 \
          libfontconfig1 \
          libgl1 \
          libglib2.0-0 \
          libnss3 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2
        echo "✓ System dependencies installed"
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<70.0" wheel
        python -c "import pkg_resources; print('✓ pkg_resources disponibile')"
        pip install --no-cache-dir pyinstaller -r requirements.txt
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps chromium
        
    - name: Verify project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        echo -e "\n=== Assets ==="
        ls -la assets/ | head -20
        echo -e "\n=== Locales ==="
        ls -la locales/ | head -10
        echo -e "\n=== Docs generali ==="
        ls -la docs_generali/
        
    - name: Build Linux executable with PyInstaller
      run: |
        pyinstaller \
          --name ATK-Pro \
          --onefile \
          --windowed \
          --icon=assets/common/grafici/ATK-Pro.ico \
          --add-data "src/main_gui_qt.py:src" \
          --add-data "src/user_prompts.py:src" \
          --add-data "assets:assets" \
          --add-data "locales:locales" \
          --add-data "docs_generali/glossario_multilingua_ATK-Pro.json:docs_generali" \
          --hidden-import=playwright \
          --hidden-import=PIL \
          --hidden-import=PySide6 \
          --hidden-import=PySide6.QtCore \
          --hidden-import=PySide6.QtGui \
          --hidden-import=PySide6.QtWidgets \
          --hidden-import=requests \
          --hidden-import=urllib3 \
          --hidden-import=certifi \
          --hidden-import=src.main_gui_qt \
          --exclude-module=pytest \
          --exclude-module=matplotlib \
          --exclude-module=scipy \
          --exclude-module=numpy \
          --exclude-module=pandas \
          src/main.py
          
    - name: Verify build output
      run: |
        echo "=== Build output ==="
        ls -lah dist/
        if [ -f "dist/ATK-Pro" ]; then
          echo "✓ ATK-Pro executable compiled successfully"
          SIZE=$(du -h dist/ATK-Pro | cut -f1)
          echo "Executable size: $SIZE"
          file dist/ATK-Pro
          chmod +x dist/ATK-Pro
        else
          echo "✗ Build failed - no executable found"
          exit 1
        fi
        
    - name: Create tarball
      run: |
        # Copia README nella directory dist
        cp README_LINUX.txt dist/
        echo "✓ README_LINUX.txt copied to dist/"
        
        # Crea tarball
        cd dist
        tar -czf ATK-Pro-Linux.tar.gz ATK-Pro README_LINUX.txt
        echo "✓ Tarball created: $(du -sh ATK-Pro-Linux.tar.gz)"
        
        # Genera checksum SHA256
        sha256sum ATK-Pro-Linux.tar.gz > ATK-Pro-Linux.tar.gz.sha256
        echo "✓ SHA256 checksum:"
        cat ATK-Pro-Linux.tar.gz.sha256
        
    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Linux-executable
        path: dist/ATK-Pro
        retention-days: 30
        
    - name: Upload tarball artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Linux-tarball
        path: |
          dist/ATK-Pro-Linux.tar.gz
          dist/ATK-Pro-Linux.tar.gz.sha256
        retention-days: 30
        
    - name: Upload to GitHub Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/ATK-Pro-Linux.tar.gz
          dist/ATK-Pro-Linux.tar.gz.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-linux:
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
    - name: Download executable artifact
      uses: actions/download-artifact@v4
      with:
        name: ATK-Pro-Linux-executable
        path: dist/

    - name: Install runtime dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          libxcb-xinerama0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-xfixes0 \
          libxcb-xkb1 \
          libxcb-cursor0 \
          libxcb-util1 \
          libxkbcommon-x11-0 \
          libdbus-1-3 \
          libegl1 \
          libfontconfig1 \
          libgl1 \
          libglib2.0-0 \
          libnss3 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libx11-xcb1 \
          libxext6
        echo "✓ Runtime dependencies installed"

    - name: Verifica eseguibile e librerie
      run: |
        chmod +x dist/ATK-Pro
        ls -lah dist/ATK-Pro
        file dist/ATK-Pro
        echo ""
        echo "=== Librerie NON trovate ==="
        ldd dist/ATK-Pro 2>&1 | grep "not found" || echo "✓ Tutte le librerie di sistema trovate"

    - name: Smoke test - avvio binario (offscreen)
      env:
        QT_QPA_PLATFORM: offscreen
        QTWEBENGINE_DISABLE_SANDBOX: "1"
        QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox"
      run: |
        chmod +x dist/ATK-Pro
        set +e
        timeout 20 dist/ATK-Pro 2>&1
        EXIT_CODE=$?
        set -e
        echo "Exit code: $EXIT_CODE"
        # Exit 0   = terminato normalmente           -> PASS
        # Exit 1   = Qt exited with error (no crash) -> PASS (app si e' avviata)
        # Exit 124 = timeout (app ancora viva 20s)   -> PASS
        # Exit 139 = SIGSEGV (crash)                 -> FAIL
        # Exit 134 = SIGABRT (crash)                 -> FAIL
        if [ "$EXIT_CODE" -eq 0 ] || [ "$EXIT_CODE" -eq 1 ] || [ "$EXIT_CODE" -eq 124 ]; then
          echo "✓ PASS: Binario avviato correttamente (exit $EXIT_CODE)"
        else
          echo "✗ FAIL: Crash del binario con exit code $EXIT_CODE"
          exit 1
        fi

    - name: Smoke test - display virtuale Xvfb
      env:
        QTWEBENGINE_DISABLE_SANDBOX: "1"
        QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox"
      run: |
        set +e
        timeout 20 xvfb-run \
          --auto-servernum \
          --server-args="-screen 0 1280x720x24" \
          dist/ATK-Pro 2>&1
        EXIT_CODE=$?
        set -e
        echo "Xvfb exit code: $EXIT_CODE"
        if [ "$EXIT_CODE" -eq 0 ] || [ "$EXIT_CODE" -eq 1 ] || [ "$EXIT_CODE" -eq 124 ]; then
          echo "✓ PASS: Binario avviato con display virtuale (exit $EXIT_CODE)"
        else
          echo "⚠ WARN: Exit code $EXIT_CODE con Xvfb"
        fi

    - name: Verifica librerie dinamiche linkate
      run: |
        echo "=== Librerie NON trovate (HARD check) ==="
        MISSING=$(ldd dist/ATK-Pro 2>&1 | grep "not found" || true)
        if [ -n "$MISSING" ]; then
          echo "✗ FAIL: Librerie mancanti:"
          echo "$MISSING"
          exit 1
        fi
        echo "✓ PASS: Tutte le librerie trovate"
        echo ""
        echo "=== Tutte le librerie ==="
        ldd dist/ATK-Pro 2>&1 | head -50 || true
