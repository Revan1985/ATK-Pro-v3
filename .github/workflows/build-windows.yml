name: Build Windows Installer

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permette esecuzione manuale

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools wheel
        python -c "import pkg_resources; print('✓ pkg_resources disponibile')"
        pip install --no-cache-dir pyinstaller -r requirements.txt
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        
    - name: Verify project structure
      run: |
        Write-Host "=== Project structure ==="
        Get-ChildItem -Force
        Write-Host "`n=== Assets ==="
        Get-ChildItem assets\ | Select-Object -First 10
        Write-Host "`n=== Docs generali ==="
        Get-ChildItem docs_generali\
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller ATK-Pro.spec
        
    - name: Verify build output
      run: |
        Write-Host "=== Build output ==="
        Get-ChildItem dist\ATK-Pro\ -Recurse | Select-Object -First 20
        if (Test-Path "dist\ATK-Pro\ATK-Pro.exe") {
          Write-Host "✓ ATK-Pro.exe compiled successfully"
          $size = (Get-Item "dist\ATK-Pro\ATK-Pro.exe").Length / 1MB
          Write-Host "Size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "✗ Build failed - no .exe found"
          exit 1
        }
        
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
        
    - name: Build installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ATK-Pro-Installer.iss
        
    - name: Verify installer
      run: |
        if (Test-Path "Output\ATK-Pro-Setup-v2.0.exe") {
          Write-Host "✓ Installer created successfully"
          $size = (Get-Item "Output\ATK-Pro-Setup-v2.0.exe").Length / 1MB
          Write-Host "Installer size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "✗ Installer creation failed"
          exit 1
        }
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Windows-exe
        path: dist/ATK-Pro/
        retention-days: 30
        
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Windows-installer
        path: Output/ATK-Pro-Setup-v2.0.exe
        retention-days: 30
        
    - name: Upload to GitHub Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Output/ATK-Pro-Setup-v2.0.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
