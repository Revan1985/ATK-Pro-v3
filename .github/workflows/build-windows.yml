name: Build Windows Installer

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permette esecuzione manuale

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install "setuptools<70.0" wheel
        python -c "import pkg_resources; print('✓ pkg_resources disponibile')"
        pip install --no-cache-dir pyinstaller -r requirements.txt
        
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        
    - name: Verify project structure
      run: |
        Write-Host "=== Project structure ==="
        Get-ChildItem -Force
        Write-Host "`n=== Assets ==="
        Get-ChildItem assets\ | Select-Object -First 10
        Write-Host "`n=== Docs generali ==="
        Get-ChildItem docs_generali\
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller ATK-Pro.spec
        
    - name: Verify build output
      run: |
        Write-Host "=== Build output ==="
        Get-ChildItem dist\ATK-Pro\ -Recurse | Select-Object -First 20
        if (Test-Path "dist\ATK-Pro\ATK-Pro.exe") {
          Write-Host "✓ ATK-Pro.exe compiled successfully"
          $size = (Get-Item "dist\ATK-Pro\ATK-Pro.exe").Length / 1MB
          Write-Host "Size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "✗ Build failed - no .exe found"
          exit 1
        }
        
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
        
    - name: Build installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ATK-Pro-Installer.iss
        
    - name: Build portable ZIP
      run: |
        $VERSION = (Select-String 'VERSION = ' src/main_gui_qt.py | ForEach-Object { $_.Line -replace '.*"(.*)".*','$1' } | Select-Object -First 1)
        Write-Host "Building portable ZIP for version: $VERSION"
        # Crea il sentinel portable.txt (non e' in git, va generato qui)
        Set-Content -Path dist\ATK-Pro\portable.txt -Value "ATK-Pro Portable Mode`nThis file enables portable mode: config.json is saved next to the executable." -Encoding UTF8
        # Crea lo ZIP
        $zipName = "ATK-Pro-v$VERSION-Windows-Portable.zip"
        Compress-Archive -Path dist\ATK-Pro -DestinationPath "Output\$zipName" -Force
        Write-Host "✓ Portable ZIP: Output\$zipName ($([math]::Round((Get-Item "Output\$zipName").Length/1MB,2)) MB)"
        # Salva il nome per gli step successivi
        echo "PORTABLE_ZIP=$zipName" >> $env:GITHUB_ENV
        echo "APP_VERSION=$VERSION" >> $env:GITHUB_ENV

    - name: Verify installer
      run: |
        $VERSION = $env:APP_VERSION
        $installerName = "ATK-Pro-Setup-v$VERSION.exe"
        if (Test-Path "Output\$installerName") {
          Write-Host "✓ Installer created successfully"
          $size = (Get-Item "Output\$installerName").Length / 1MB
          Write-Host "Installer size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "✗ Installer creation failed"
          exit 1
        }
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Windows-exe
        path: dist/ATK-Pro/
        retention-days: 30
        
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Windows-installer
        path: Output/ATK-Pro-Setup-v${{ env.APP_VERSION }}.exe
        retention-days: 30

    - name: Upload portable artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATK-Pro-Windows-portable
        path: Output/${{ env.PORTABLE_ZIP }}
        retention-days: 30
        
    - name: Upload to GitHub Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      shell: bash
      run: |
        # Assicura che la release esista e non sia draft
        # (gh release upload fallisce con 404 su release draft)
        REPO="$GITHUB_REPOSITORY"
        REL_ID=$(gh api "repos/$REPO/releases" \
          --jq "[.[] | select(.tag_name==\"${{ github.ref_name }}\")][0].id // empty" 2>/dev/null || true)
        if [ -n "$REL_ID" ]; then
          gh api "repos/$REPO/releases/$REL_ID" --method PATCH \
            --field draft=false --field prerelease=false > /dev/null 2>&1 || true
        else
          gh release create "${{ github.ref_name }}" \
            --title "ATK-Pro ${{ github.ref_name }}" \
            --notes "" --draft=false 2>/dev/null || true
        fi
        gh release upload "${{ github.ref_name }}" \
          "Output/ATK-Pro-Setup-v${APP_VERSION}.exe" \
          "Output/${PORTABLE_ZIP}" \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
